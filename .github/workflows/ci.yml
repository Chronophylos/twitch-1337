name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  fmt:
    name: fmt
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          persist-credentials: false

      - name: Read Rust toolchain channel
        id: rust-toolchain
        run: |
          channel=$(grep '^channel' crates/twitch-1337/rust-toolchain.toml | sed -E 's/.*"([^"]+)".*/\1/')
          echo "channel=$channel" >> "$GITHUB_OUTPUT"

      - uses: dtolnay/rust-toolchain@master # zizmor: ignore[unpinned-uses]
        with:
          toolchain: ${{ steps.rust-toolchain.outputs.channel }}
          components: rustfmt

      - name: cargo fmt
        run: cargo fmt --all -- --check

  check:
    name: clippy + test
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          persist-credentials: false

      - name: Read Rust toolchain channel
        id: rust-toolchain
        run: |
          channel=$(grep '^channel' crates/twitch-1337/rust-toolchain.toml | sed -E 's/.*"([^"]+)".*/\1/')
          echo "channel=$channel" >> "$GITHUB_OUTPUT"

      - uses: dtolnay/rust-toolchain@master # zizmor: ignore[unpinned-uses]
        with:
          toolchain: ${{ steps.rust-toolchain.outputs.channel }}
          components: clippy

      - uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2

      - name: cargo clippy
        run: cargo clippy --workspace --all-targets -- -D warnings

      - name: Install nextest
        uses: taiki-e/install-action@nextest # zizmor: ignore[unpinned-uses]

      - name: cargo nextest run
        run: cargo nextest run --workspace

  audit:
    name: cargo audit
    runs-on: ubuntu-latest
    permissions:
      contents: read
      issues: write
      checks: write
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          persist-credentials: false

      - uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2

      - uses: rustsec/audit-check@69366f33c96575abad1ee0dba8212993eecbe998 # v2.0.0
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
